services:
  - name: capitalflow-shell
    type: web
    runtime: docker
    plan: free
    branch: master
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    dockerfilePath: deploy/docker/shell.Dockerfile
    dockerContext: .
    envVars:
      - key: MFE_PAYMENTS_URL
        value: https://capitalflow-mfe-payments.onrender.com
      - key: MFE_TREASURY_URL
        value: https://capitalflow-mfe-treasury.onrender.com
      - key: MFE_AUTH_URL
        value: https://capitalflow-mfe-auth.onrender.com
      - key: MFE_COMPLIANCE_URL
        value: https://capitalflow-mfe-compliance.onrender.com
      - key: MFE_ONBOARDING_URL
        value: https://capitalflow-mfe-onboarding.onrender.com
      - key: MFE_ADMIN_URL
        value: https://capitalflow-mfe-admin.onrender.com
      - key: ANALYTICS_ELEMENT_URL
        value: https://capitalflow-mfe-analytics.onrender.com/analytics-element.js
      - key: DOCS_URL
        value: https://capitalflow-docs.onrender.com
    buildFilter:
      paths:
        - shell/**/*
        - projects/core/**/*
        - library/utils/**/*
        - deploy/docker/shell.Dockerfile
        - deploy/nginx/spa.conf
        - tools/**/*
        - package.json
        - package-lock.json
        - nx.json
        - tsconfig.json
        - tsconfig.base.json
        - eslint.config.mjs

