server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' http://localhost:4201 http://localhost:4202 http://localhost:4203 http://localhost:4204 http://localhost:4205 http://localhost:4206 http://localhost:4207; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' http://localhost:4201 http://localhost:4202 http://localhost:4203 http://localhost:4204 http://localhost:4205 http://localhost:4206 http://localhost:4207; frame-src 'none'; object-src 'none'; base-uri 'self'; frame-ancestors 'self'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location ~ \.mjs$ {
    default_type application/javascript;
    try_files $uri =404;
  }

  location / {
    default_type text/html;
    try_files $uri $uri/ /index.html;
  }
}
